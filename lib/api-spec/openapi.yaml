openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: API Hub - Deploy and proxy your own APIs like Render
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: services
    description: Service management
  - name: deploy
    description: Deployment operations
  - name: stats
    description: Dashboard statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user session
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a new service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Slug already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      summary: Get a service by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateService
      tags: [services]
      summary: Update a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /services/{id}/toggle:
    patch:
      operationId: toggleService
      tags: [services]
      summary: Toggle service active/inactive
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found

  /services/{id}/test:
    post:
      operationId: testService
      tags: [services]
      summary: Test connectivity to a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestResult"

  /deploy/{id}:
    post:
      operationId: deployService
      tags: [deploy]
      summary: Clone, build, and start a GitHub service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deployment started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deploy/{id}/stop:
    post:
      operationId: stopService
      tags: [deploy]
      summary: Stop a running service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /deploy/{id}/restart:
    post:
      operationId: restartService
      tags: [deploy]
      summary: Restart a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Restarting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /deploy/{id}/logs:
    get:
      operationId: getServiceLogs
      tags: [deploy]
      summary: Get build and runtime logs for a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceLogs"

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/services/{id}/requests:
    get:
      operationId: getServiceRequests
      tags: [stats]
      summary: Get recent request logs for a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recent requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RequestLog"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginInput:
      type: object
      properties:
        password:
          type: string
      required: [password]

    AuthUser:
      type: object
      properties:
        authenticated:
          type: boolean
        username:
          type: string
      required: [authenticated, username]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    Service:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        targetUrl:
          type: ["string", "null"]
        githubRepo:
          type: ["string", "null"]
        isActive:
          type: boolean
        status:
          type: string
        deployedPort:
          type: ["integer", "null"]
        runtime:
          type: ["string", "null"]
        startCommand:
          type: ["string", "null"]
        buildCommand:
          type: ["string", "null"]
        envVars:
          type: ["string", "null"]
        requestCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - slug
        - isActive
        - status
        - requestCount
        - createdAt
        - updatedAt

    ServiceInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        description:
          type: string
        targetUrl:
          type: string
        githubRepo:
          type: string
        runtime:
          type: string
        startCommand:
          type: string
        buildCommand:
          type: string
        envVars:
          type: string
      required:
        - name
        - slug

    ServiceUpdate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        targetUrl:
          type: string
        githubRepo:
          type: string
        isActive:
          type: boolean
        runtime:
          type: string
        startCommand:
          type: string
        buildCommand:
          type: string
        envVars:
          type: string

    TestResult:
      type: object
      properties:
        success:
          type: boolean
        statusCode:
          type: ["integer", "null"]
        responseTime:
          type: ["integer", "null"]
        error:
          type: ["string", "null"]
      required: [success]

    ServiceLogs:
      type: object
      properties:
        buildLogs:
          type: string
        runtimeLogs:
          type: string
      required: [buildLogs, runtimeLogs]

    DashboardStats:
      type: object
      properties:
        totalServices:
          type: integer
        activeServices:
          type: integer
        runningServices:
          type: integer
        totalRequests:
          type: integer
        servicesThisWeek:
          type: integer
        topServices:
          type: array
          items:
            $ref: "#/components/schemas/ServiceSummary"
      required:
        - totalServices
        - activeServices
        - runningServices
        - totalRequests
        - servicesThisWeek
        - topServices

    ServiceSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        requestCount:
          type: integer
        isActive:
          type: boolean
        status:
          type: string
      required: [id, name, slug, requestCount, isActive, status]

    RequestLog:
      type: object
      properties:
        id:
          type: integer
        method:
          type: string
        path:
          type: string
        statusCode:
          type: ["integer", "null"]
        responseTime:
          type: ["integer", "null"]
        createdAt:
          type: string
      required: [id, method, path, createdAt]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
