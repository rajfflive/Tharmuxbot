<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeHost — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-icon">⚡</div>
      <h1>CodeHost</h1>
      <p>Admin access only</p>
    </div>
    <div class="login-card">
      {% if error %}
      <div class="error-msg" style="color:#f87171;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:13px;">
        ⚠️ {{ error }}
      </div>
      {% endif %}
      <form method="POST" action="{{ url_for('login') }}">
        <input type="password" name="admin_key" placeholder="Enter admin password" autofocus required />
        <button type="submit">Login →</button>
      </form>
    </div>
  </div>
</body>
</html>
