<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeHost — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="dash-body">

  <header class="dash-topbar">
    <div class="dash-brand">
      <span class="dash-brand-icon">⚡</span>
      <span>CodeHost</span>
    </div>
    <a class="dash-logout" href="{{ url_for('logout') }}">Log out</a>
  </header>

  <main class="dash-main">
    <div class="dash-header">
      <h1>Projects</h1>
      <button id="new-project-btn" class="dash-new-btn">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6.5 1v11M1 6.5h11"/></svg>
        New project
      </button>
    </div>

    <div class="project-grid">
      {% for p in projects %}
      <a class="project-card" href="/projects/{{ p.id }}">
        <div class="card-top">
          <span class="card-dot {{ 'running' if p.running else 'stopped' }}"></span>
          <span class="card-name">{{ p.name }}</span>
        </div>
        <div class="card-meta">
          {% if p.github_url %}<span class="badge badge-accent">GitHub</span>{% endif %}
          <span class="badge badge-muted">{{ p.entry_file or 'no entry' }}</span>
          {% if p.running %}<span class="badge" style="background:var(--green-dim);color:var(--green)">Running</span>{% endif %}
        </div>
      </a>
      {% else %}
      <div class="empty-state">
        <div class="empty-state-icon">🚀</div>
        <p>No projects yet.<br>Create your first one to get started.</p>
      </div>
      {% endfor %}
    </div>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
