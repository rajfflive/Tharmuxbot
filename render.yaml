services:
  - type: web
    name: api-hub-server
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: changeme123
      - key: DATABASE_URL
        fromDatabase:
          name: api-hub-db
          property: connectionString

  - type: web
    name: api-hub-frontend
    runtime: static
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-hub run build
    staticPublishPath: artifacts/api-hub/dist
    envVars:
      - key: VITE_API_BASE
        value: https://api-hub-server.onrender.com

databases:
  - name: api-hub-db
    plan: free
    databaseName: apihub
